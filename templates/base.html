<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Cipher Bench{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="site-header">
  <a class="brand" href="{{ url_for('index') }}">
    <span class="brand-mark">01</span>
    <span class="brand-name">Cipher Bench</span>
  </a>
  <nav class="site-nav">
    <a href="{{ url_for('module_page', key='des') }}">DES</a>
    <a href="{{ url_for('module_page', key='sdes') }}">S-DES</a>
    <a href="{{ url_for('module_page', key='aes') }}">AES</a>
    <a href="{{ url_for('module_page', key='saes') }}">S-AES</a>
  </nav>
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <p>Cipher Bench &mdash; Simulasi Algoritma Kriptografi Simetris (DES &middot; S-DES &middot; AES &middot; S-AES)</p>
  <p class="muted">Dibangun untuk keperluan pembelajaran kriptografi.</p>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
